services:
  - type: web
    name: medical-report-ai
    env: python
    buildCommand: pip install -r requirements.txt && python -c "import pytesseract; print('pytesseract OK')"
    startCommand: bash start.sh
    envVars:
      - key: LLM_PROVIDER
        value: deepseek
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
